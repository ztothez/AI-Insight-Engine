<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Analyze — AI Insight Engine</title>
    <link rel="stylesheet" href="/static/css/main.css" />
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to main content</a>

    <header class="site-header">
      <a class="site-brand" href="/">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/></svg>
        AI Insight Engine
      </a>
      <nav class="site-nav" aria-label="Main">
        <a class="nav-link" data-page="landing" href="/">Home</a>
        <a class="nav-link" data-page="analyze" href="/analyze">Analyze</a>
        <a class="nav-link" data-page="agent" href="/agent">Agent</a>
      </nav>
      <div class="header-actions">
        <button type="button" class="btn btn-primary" id="analyze-btn">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><polygon points="6 3 20 12 6 21 6 3"/></svg>
          <span class="hide-mobile">Analyze Code</span>
        </button>
      </div>
    </header>

    <nav class="breadcrumb" aria-label="Breadcrumb">
      <a href="/analyze">Analyze</a>
    </nav>

    <main id="main" class="page-main">
      <div class="mobile-tabs" role="tablist" aria-label="Workspace panels">
        <button type="button" class="mobile-tab active" data-tab="code" role="tab" aria-selected="true">Code</button>
        <button type="button" class="mobile-tab" data-tab="results" role="tab" aria-selected="false">Results</button>
      </div>

      <div class="workspace">
        <section class="workspace-panel" id="code-panel" aria-labelledby="code-heading">
          <div class="panel-header">
            <h1 id="code-heading" class="panel-title">Code editor</h1>
            <div class="panel-toolbar">
              <span class="badge badge-neutral">Python</span>
              <button type="button" class="btn btn-ghost btn-sm" id="paste-code-btn">Paste code</button>
              <button type="button" class="btn btn-ghost btn-sm" id="load-sample-btn">Load sample</button>
            </div>
          </div>

          <div class="slider-field">
            <label for="strictness">Strictness level</label>
            <span class="helper">1 = lenient · 5 = strict</span>
            <div class="slider-row">
              <input type="range" id="strictness" min="1" max="5" value="3" />
              <span class="slider-value" id="strictness-value" aria-live="polite">3</span>
            </div>
          </div>

          <div class="editor-wrap">
            <div id="code-editor" aria-hidden="true"></div>
            <textarea
              id="fallback-editor"
              class="fallback-editor"
              aria-label="Python code editor"
              placeholder="# Paste your Python code here (Ctrl+V or Cmd+V)&#10;# Or click “Paste code” above"
              spellcheck="false"
              autofocus
            ></textarea>
          </div>

          <p class="editor-hint">
            Click the editor and paste with <kbd>Ctrl</kbd>+<kbd>V</kbd>, or use
            <strong>Paste code</strong> above.
          </p>

          <div id="editor-alert" hidden></div>

          <p class="privacy-note">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            Snippet is processed by Together.ai for analysis. Do not paste production secrets.
          </p>

          <div class="sticky-action-bar">
            <button type="button" class="btn btn-primary analyze-trigger" style="width:100%">
              Analyze Code
            </button>
          </div>
        </section>

        <section class="workspace-panel results-panel" id="results-panel" aria-labelledby="results-heading">
          <h2 id="results-heading" class="panel-title">Results</h2>
          <div id="results-live" class="results-live" tabindex="-1" aria-live="polite"></div>
          <div id="results-content"></div>
        </section>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
    <script type="module" src="/static/js/analyze.js"></script>
  </body>
</html>
